name: ðŸ› ï¸ Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Construire l'APK
    runs-on: ubuntu-latest

    steps:
      - name: ðŸ“¥ Checkout du code
        uses: actions/checkout@v4

      - name: â˜• Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: ðŸ¤– Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: âš™ï¸ Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: ðŸ”‘ GÃ©nÃ©rer le wrapper Gradle
        run: gradle wrapper --gradle-version 8.5

      - name: ðŸ—ï¸ Construire l'APK Debug
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: ðŸ—ï¸ Construire l'APK Release (non-signÃ©)
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        continue-on-error: true

      - name: ðŸ“¤ Upload APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: LeSonDuTibo-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: ðŸ“¤ Upload APK Release (non-signÃ©)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: LeSonDuTibo-release-unsigned
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: ðŸš€ CrÃ©er une Release GitHub (sur tag v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
